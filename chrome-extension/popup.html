<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Media Log</h1>
      <button type="button" id="btn-settings" class="settings-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
    <p id="greeting" class="greeting"></p>
    <nav>
      <button class="tab active" data-tab="add">Add</button>
      <button class="tab" data-tab="week">This Week</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="sync">Sync</button>
    </nav>
  </header>

  <!-- Add Entry -->
  <section id="tab-add" class="tab-content active">
    <form id="entry-form">
      <label>
        URL (optional)
        <input type="url" id="entry-url">
      </label>
      <label>
        Title
        <input type="text" id="entry-title" required>
      </label>
      <label>
        Type
        <select id="entry-type">
          <option value="anime">Anime</option>
          <option value="article" selected>Article</option>
          <option value="book">Book</option>
          <option value="film">Film</option>
          <option value="game">Game</option>
          <option value="manga">Manga</option>
          <option value="music">Music</option>
          <option value="podcast">Podcast</option>
          <option value="tv">TV Show</option>
        </select>
      </label>
      <label>
        Date
        <input type="date" id="entry-date" required>
      </label>
      <label>
        Rating (1-10)
        <input type="number" id="entry-rating" min="1" max="10">
      </label>
      <label>
        Note
        <textarea id="entry-note" rows="2"></textarea>
      </label>
      <button type="submit" id="btn-add">Add</button>
      <div id="add-status" class="status"></div>
    </form>
  </section>

  <!-- This Week -->
  <section id="tab-week" class="tab-content">
    <div id="week-header"></div>
    <div id="week-entries"></div>

    <!-- Inline edit form (hidden by default) -->
    <form id="edit-form" class="edit-form" style="display:none">
      <label>
        Title
        <input type="text" id="edit-title" required>
      </label>
      <label>
        URL (optional)
        <input type="url" id="edit-url">
      </label>
      <label>
        Type
        <select id="edit-type">
          <option value="anime">Anime</option>
          <option value="article" selected>Article</option>
          <option value="book">Book</option>
          <option value="film">Film</option>
          <option value="game">Game</option>
          <option value="manga">Manga</option>
          <option value="music">Music</option>
          <option value="podcast">Podcast</option>
          <option value="tv">TV Show</option>
        </select>
      </label>
      <label>
        Date
        <input type="date" id="edit-date" required>
      </label>
      <label>
        Rating (1-10)
        <input type="number" id="edit-rating" min="1" max="10">
      </label>
      <label>
        Note
        <textarea id="edit-note" rows="2"></textarea>
      </label>
      <div class="edit-actions">
        <button type="submit">Save</button>
        <button type="button" id="edit-cancel">Cancel</button>
      </div>
    </form>

    <div class="week-actions">
      <button id="btn-export-week">Export Week JSON</button>
      <button id="btn-end-week" class="secondary-action">End Week</button>
      <button id="btn-new-week" class="secondary-action">Start New Week</button>
    </div>
  </section>

  <!-- History -->
  <section id="tab-history" class="tab-content">
    <div id="history-notice" class="history-notice" hidden></div>
    <div id="history-list"></div>
    <div id="history-empty" class="empty">No archived weeks yet.</div>
  </section>

  <!-- Sync -->
  <section id="tab-sync" class="tab-content">
    <form id="sync-form">
      <label>
        Sync mode
        <select id="sync-mode">
          <option value="supabase">Supabase</option>
          <option value="local">Local dev</option>
        </select>
      </label>
      <div class="sync-local-fields">
        <label>
          Local endpoint
          <input type="url" id="sync-endpoint" placeholder="http://127.0.0.1:43189">
        </label>
        <label>
          Local token
          <input type="password" id="sync-token" autocomplete="off">
        </label>
      </div>
      <div class="sync-supabase-fields">
        <label>
          Supabase URL
          <input type="url" id="sync-supabase-url" placeholder="https://project.supabase.co">
        </label>
        <label>
          Publishable key
          <input type="password" id="sync-supabase-key" autocomplete="off">
        </label>
        <label>
          Email
          <input type="email" id="sync-email" autocomplete="username">
        </label>
        <label>
          Password
          <input type="password" id="sync-password" autocomplete="current-password">
        </label>
        <div class="auth-actions">
          <button type="button" id="btn-supabase-sign-in">Sign In</button>
          <button type="button" id="btn-supabase-sign-up" class="secondary-action">Sign Up</button>
          <button type="button" id="btn-supabase-reset" class="secondary-action">Reset Password</button>
          <button type="button" id="btn-supabase-sign-out" class="secondary-action">Sign Out</button>
          <button type="button" id="btn-sync-unlock" class="secondary-action">Unlock Sync ($2)</button>
        </div>
      </div>
      <label>
        User ID
        <input type="text" id="sync-user-id" placeholder="personal">
      </label>
      <button type="submit">Save Sync Settings</button>
    </form>
    <div class="sync-actions">
      <button id="btn-sync-now">Sync Now</button>
    </div>
    <div class="migration-actions">
      <button id="btn-prepare-migration" class="secondary-action">Prepare Local Data</button>
    </div>
    <div id="sync-summary" class="sync-summary"></div>
    <div id="sync-status" class="status"></div>
  </section>

  <!-- Settings -->
  <section id="tab-settings" class="tab-content">
    <label class="name-field">
      Your name
      <input type="text" id="user-name" placeholder="optional — used in your greeting">
    </label>
  </section>

  <script src="popup.js"></script>
</body>
</html>
